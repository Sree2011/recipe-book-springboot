# ===============================
# 1. SERVER CONFIGURATION
# ===============================
# Run this on 8081 so it doesn't clash with the scaling-service (8082)
server.port=8081
spring.application.name=recipe-service

# ===============================
# 2. DATABASE CONFIGURATION (H2)
# ===============================
# Using an in-memory database to keep the laptop from hanging
spring.datasource.url=jdbc:h2:mem:recipedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Allows you to see the H2 Console in your browser at http://localhost:8081/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# 3. JPA / HIBERNATE SETTINGS
# ===============================
# Automatically creates the tables based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update
# Show SQL in the console so you can debug your Indian household measurements
spring.jpa.show-sql=true

# ===============================
# 4. FEIGN CLIENT LOGGING
# ===============================
# This helps you see the actual JSON moving between services in the IntelliJ logs
logging.level.com.sai.fullstack.recipe_service.client=DEBUG